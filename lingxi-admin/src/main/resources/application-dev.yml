spring:
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:lingxi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:123456}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      password: ${REDIS_PASSWORD:}

file:
  storage: ${FILE_STORAGE:local}
  domain: ${FILE_DOMAIN:http://127.0.0.1:8080}
  path: ${FILE_PATH:./uploadPath/dev}

referer:
  enabled: false
  allowed-domains: 127.0.0.1,localhost

minio:
  url: ${MINIO_URL:http://127.0.0.1:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:lingxi}

cos:
  secret-id: ${TENCENT_COS_SECRET_ID:}
  secret-key: ${TENCENT_COS_SECRET_KEY:}
  region: ${TENCENT_COS_REGION:ap-guangzhou}
  bucket-name: ${TENCENT_COS_BUCKET:}
  domain: ${TENCENT_COS_DOMAIN:}

cos-vector:
  secret-id: ${TENCENT_COS_SECRET_ID:}
  secret-key: ${TENCENT_COS_SECRET_KEY:}
  session-token: ${TENCENT_COS_SESSION_TOKEN:}
  region: ${TENCENT_COS_REGION:ap-guangzhou}
  bucket-name: ${TENCENT_COS_VECTOR_BUCKET:}
  index-name: ${TENCENT_COS_VECTOR_INDEX:kb_embedding}
  domain: ${TENCENT_COS_VECTOR_DOMAIN:}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}

seniverse:
  weather:
    enabled: true
    api-key: ${SENIVERSE_WEATHER_API_KEY:}

logging:
  level:
    com.lingxi: debug
