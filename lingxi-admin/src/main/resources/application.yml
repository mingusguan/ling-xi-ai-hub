server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: lingxi-admin
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
  servlet:
    multipart:
      max-file-size: 50MB      # 单个文件最大大小
      max-request-size: 100MB  # 总请求最大大小
  ai:
    mcp:
      client:
        enabled: false
      server:
        enabled: true
        name: lingxi-admin-mcp-server
        type: sync
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml,classpath*:mapper/*.xml
  type-aliases-package: com.lingxi.system.api.domain,com.lingxi.system.domain,com.lingxi.job.domain,com.lingxi.gen.domain,com.lingxi.oa.domain,com.lingxi.knowledge.domain,com.lingxi.ai.domain
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

flowable:
  database-schema-update: true
  db-history-used: true
  history-level: full
  check-process-definitions: false
  process-definition-location-prefix: classpath*:/processes/

file:
  prefix: /profile

gen:
  author: lingxi
  packageName: com.lingxi
  autoRemovePre: false
  tablePrefix: sys_
  allowOverwrite: false

dashscope:
  model: qwen-plus
  embedding-model: text-embedding-v3

seniverse:
  weather:
    base-url: https://api.seniverse.com
    language: zh-Hans
    unit: c
    forecast-days: 3
    request-timeout: 8s

lingxi:
  system:
    protection:
      enabled: ${SYSTEM_PROTECTION_ENABLED:true}
      demo-user-names: ${SYSTEM_PROTECTION_DEMO_USERS:demo}
      protected-user-names: ${SYSTEM_PROTECTION_USERS:mingus,demo}
      protected-role-ids: ${SYSTEM_PROTECTION_ROLE_IDS:1}
      protected-role-keys: ${SYSTEM_PROTECTION_ROLE_KEYS:mingus,demo}
      protected-config-keys: ${SYSTEM_PROTECTION_CONFIG_KEYS:sys.account.registerUser,sys.user.initPassword,sys.account.initPasswordModify,sys.account.passwordValidateDays}
      protected-dict-types: ${SYSTEM_PROTECTION_DICT_TYPES:sys_normal_disable,sys_user_sex,sys_show_hide,sys_notice_type,sys_notice_status,sys_oper_type,sys_common_status,sys_job_group,sys_job_status,sys_yes_no,sys_job_level}
  oa:
    workflow:
      enabled: true
  mcp:
    enabled: true
    default-timeout: 20s

knowledge:
  vector-store: ${KNOWLEDGE_VECTOR_STORE:cos-vector}

security:
  captcha:
    enabled: ${CAPTCHA_ENABLED:true}
    type: ${CAPTCHA_TYPE:math}

logging:
  file:
    path: ${LOG_PATH:./logs/lingxi-admin}
  level:
    com.lingxi: info
