spring:
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:lingxi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:}
          driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      password: ${REDIS_PASSWORD:}

file:
  storage: ${FILE_STORAGE:cos}
  domain: ${FILE_DOMAIN:http://127.0.0.1:8080}
  path: ${FILE_PATH:./uploadPath}

referer:
  enabled: ${REFERER_ENABLED:false}
  allowed-domains: ${REFERER_ALLOWED_DOMAINS:127.0.0.1,localhost}

cos:
  secret-id: ${TENCENT_COS_SECRET_ID:}
  secret-key: ${TENCENT_COS_SECRET_KEY:}
  region: ${TENCENT_COS_REGION:ap-guangzhou}
  bucket-name: ${TENCENT_COS_BUCKET:}
  domain: ${TENCENT_COS_DOMAIN:}

cos-vector:
  secret-id: ${TENCENT_COS_SECRET_ID:}
  secret-key: ${TENCENT_COS_SECRET_KEY:}
  session-token: ${TENCENT_COS_SESSION_TOKEN:}
  region: ${TENCENT_COS_REGION:ap-guangzhou}
  bucket-name: ${TENCENT_COS_VECTOR_BUCKET:}
  index-name: ${TENCENT_COS_VECTOR_INDEX:kb_embedding}
  domain: ${TENCENT_COS_VECTOR_DOMAIN:}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}

seniverse:
  weather:
    enabled: ${SENIVERSE_WEATHER_ENABLED:true}
    api-key: ${SENIVERSE_WEATHER_API_KEY:}

logging:
  level:
    com.lingxi: info
