# Tomcat
server:
  port: 9820

# Spring
spring:
  application:
    name: lingxi-ai
  ai:
    mcp:
      client:
        enabled: false
        name: lingxi-ai-mcp-client
        version: 1.0.0
        initialized: true
        request-timeout: 20s
        type: SYNC
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
  config:
    file-extension: yml
    import:
      - optional:nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}

# DashScope chat model
dashscope:
  api-key: sk-0ec5886dc7c94cf9a49752131f180d05
  model: qwen-plus

# Seniverse weather
seniverse:
  weather:
    enabled: true
    api-key: ${SENIVERSE_WEATHER_API_KEY:S_ZEODoiCji4fHPNq}
    base-url: https://api.seniverse.com
    language: zh-Hans
    unit: c
    forecast-days: 3
    request-timeout: 8s

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# MCP platform governance
lingxi:
  mcp:
    enabled: true
    default-timeout: 20s
