# Tomcat
server:
  port: 9820

# Spring
spring:
  application:
    name: lingxi-ai
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
      config:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
  config:
    file-extension: yml
    import:
      - optional:nacos:application-${spring.profiles.active}.${spring.config.file-extension}
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.config.file-extension}

# 阿里云 通义千问 + 向量模型
dashscope:
  api-key: sk-0ec5886dc7c94cf9a49752131f180d05
  model: qwen-plus
  embedding-model: text-embedding-v3

# Milvus 向量库配置
milvus:
  host: localhost
  port: 19530
  collection-name: kb_embedding

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true