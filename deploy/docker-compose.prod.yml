services:
  lingxi-admin:
    image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}
    container_name: lingxi-admin
    restart: unless-stopped
    networks:
      - shared
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_OPTS: ${JAVA_OPTS:-"-Xms256m -Xmx768m -XX:+UseG1GC"}
      SERVER_PORT: 8080

      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: ${MYSQL_URL}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: ${MYSQL_PASSWORD}

      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_DATABASE: ${REDIS_DATABASE:-0}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      FILE_STORAGE: ${FILE_STORAGE:-cos}
      FILE_PATH: ${FILE_PATH:-/app/uploadPath}
      FILE_DOMAIN: ${FILE_DOMAIN:-http://127.0.0.1:8080}
      REFERER_ENABLED: ${REFERER_ENABLED:-false}
      REFERER_ALLOWED_DOMAINS: ${REFERER_ALLOWED_DOMAINS:-127.0.0.1,localhost}

      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      SENIVERSE_WEATHER_API_KEY: ${SENIVERSE_WEATHER_API_KEY:-}

      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_SESSION_TOKEN: ${TENCENT_COS_SESSION_TOKEN:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-guangzhou}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
      TENCENT_COS_DOMAIN: ${TENCENT_COS_DOMAIN:-}
      TENCENT_COS_SIGNED_URL_EXPIRE_SECONDS: ${TENCENT_COS_SIGNED_URL_EXPIRE_SECONDS:-600}
      TENCENT_COS_VECTOR_BUCKET: ${TENCENT_COS_VECTOR_BUCKET:-}
      TENCENT_COS_VECTOR_INDEX: ${TENCENT_COS_VECTOR_INDEX:-kb-embedding}
      TENCENT_COS_VECTOR_DOMAIN: ${TENCENT_COS_VECTOR_DOMAIN:-}
      KNOWLEDGE_VECTOR_STORE: ${KNOWLEDGE_VECTOR_STORE:-cos-vector}
    volumes:
      - ./logs:/app/logs
      - ./uploadPath:/app/uploadPath
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  shared:
    name: ${SHARED_NETWORK:-mingus-net}
    external: true
