name: LingXi Image Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  IMAGE_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  IMAGE_NAMESPACE: mingus
  IMAGE_NAME: lingxi-ai-hub

jobs:
  docker-build:
    name: Build And Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          image_repository="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
          short_sha="${GITHUB_SHA::7}"
          {
            echo 'tags<<EOF'
            echo "${image_repository}:${GITHUB_SHA}"
            echo "${image_repository}:${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${image_repository}:${GITHUB_REF_NAME}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tags }}
